
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kogwang' Comprehensive School</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Inter, system-ui, sans-serif;
        }

        .input-field {
            transition: all 0.2s ease;
        }

        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .login-btn {
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-800 to-blue-600 px-4">

    <!-- Login Card -->
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">

        <!-- Header -->
        <h1 class="text-2xl font-bold text-center text-blue-700">
            OBISA SCHOOL
        </h1>

        <p class="text-center text-gray-500 text-xs uppercase tracking-wider mt-1 mb-6">
            Deqs Systems 
        </p>

        <!-- Error Message -->
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm text-center p-3 rounded-lg mb-4">
            {{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    required
                    placeholder="Enter username"
                    class="input-field w-full px-3 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">
                    Password
                </label>

                <div class="relative">
                    <input
                        id="password"
                        type="password"
                        name="password"
                        required
                        placeholder="••••••••"
                        class="input-field w-full px-3 py-3 pr-12 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                    >

                    <button
                        type="button"
                        onclick="togglePassword()"
                        class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-blue-600"
                    >
                        <svg
                            id="eyeIcon"
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm6.364 0C19.95 7.943 16.28 5 12 5S4.05 7.943 2.636 12C4.05 16.057 7.72 19 12 19s7.95-2.943 9.364-7z"
                            />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember / Forgot -->
            <div class="flex justify-between items-center text-xs">
                <label class="flex items-center gap-2 text-gray-600">
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#" class="text-blue-600 hover:text-blue-800">
                    Forgot Password?
                </a>
            </div>

            <!-- Submit -->
            <button
                type="submit"
                class="login-btn w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold shadow-md"
            >
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center my-5">
            <div class="flex-1 border-t border-gray-200"></div>

            <span class="px-3 text-xs text-gray-400 uppercase">
                Student Access
            </span>

            <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <!-- Student Portal -->
        <a
            href="{% url 'students_portal' %}"
            class="block w-full text-center border-2 border-blue-600 text-blue-600 py-3 rounded-lg font-semibold hover:bg-blue-50 transition"
        >
            Students Portal
        </a>

        <!-- Footer -->
        <p class="text-center text-gray-400 text-xs mt-6">
            &copy; Deqs Systems • All Rights Reserved
        </p>

    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById('password');

            if (password.type === 'password') {
                password.type = 'text';
            } else {
                password.type = 'password';
            }
        }
    </script>

</body>
</html>
```
